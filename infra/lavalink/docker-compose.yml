services:
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    restart: unless-stopped
    user: root
    environment:
      - _JAVA_OPTIONS=-Xmx6G
      - SERVER_PORT=${LAVALINK_PORT:-2333}
      - LAVALINK_SERVER_PASSWORD=${LAVALINK_PASSWORD}
    volumes:
      - ./application.yml:/opt/Lavalink/application.yml
      - lavalink_plugins:/opt/Lavalink/plugins
    ports:
      - '${LAVALINK_PORT}:2333'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:2333/version']
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  lavalink_plugins:
